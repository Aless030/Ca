<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feliz Cumpleaños, Mi Amor 🎂</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Dancing+Script:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #f5ede0;
    --warm: #c9956a;
    --dark: #120c06;
    --rose: #d4707a;
    --gold: #c8a96e;
    --blush: #f0d5c8;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--dark);
    color: var(--cream);
    font-family: 'Cormorant Garamond', serif;
    overflow-x: hidden;
  }

  body::after {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 9998; opacity: 0.5;
  }

  /* PETALS */
  .petals-container {
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none; z-index: 9997; overflow: hidden;
  }
  .petal {
    position: absolute; top: -50px;
    background: radial-gradient(ellipse at 40% 30%, #f0a0b0ee, #c0708066);
    border-radius: 50% 50% 50% 0 / 60% 60% 40% 40%;
    animation: fall linear infinite;
  }
  @keyframes fall {
    0%   { transform: translateY(0) rotate(0deg) translateX(0px); opacity: 0.9; }
    30%  { transform: translateY(30vh) rotate(120deg) translateX(25px); opacity: 0.7; }
    70%  { transform: translateY(75vh) rotate(270deg) translateX(-20px); opacity: 0.4; }
    100% { transform: translateY(115vh) rotate(360deg) translateX(10px); opacity: 0; }
  }

  /* HERO */
  #hero {
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center; position: relative;
    padding: 3rem 2rem 5rem; overflow: hidden;
  }
  .hero-bg {
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 70% 55% at 50% 25%, #c9956a18, transparent),
      radial-gradient(ellipse 45% 45% at 15% 85%, #d4707a14, transparent),
      radial-gradient(ellipse 55% 65% at 85% 65%, #c8a96e0c, transparent),
      radial-gradient(ellipse 100% 60% at 50% 100%, #0d080a, transparent 60%);
  }

  .hero-rings {
    position: relative; width: 220px; height: 220px;
    margin-bottom: 2.8rem;
    animation: floatIn 1.6s cubic-bezier(.22,.68,0,1.2) both;
  }
  .hero-rings::before, .hero-rings::after {
    content: ''; position: absolute; border-radius: 50%;
  }
  .hero-rings::before {
    inset: -18px; border: 1px solid #c8a96e22;
    animation: ringPulse 4s ease-in-out infinite;
  }
  .hero-rings::after {
    inset: -36px; border: 1px solid #d4707a12;
    animation: ringPulse 4s ease-in-out infinite 1.2s;
  }
  @keyframes ringPulse {
    0%, 100% { opacity: 0.4; transform: scale(1); }
    50%       { opacity: 1;   transform: scale(1.025); }
  }

  .hero-photo-frame { position: absolute; inset: 0; }
  .hero-photo-frame::before {
    content: ''; position: absolute; inset: -10px; border-radius: 50%;
    background: conic-gradient(from 0deg, var(--gold), var(--rose), #e8a0a8, var(--warm), var(--gold));
    animation: spin 8s linear infinite;
  }
  .hero-photo-frame::after {
    content: ''; position: absolute; inset: -3px;
    border-radius: 50%; background: var(--dark);
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes floatIn {
    from { opacity: 0; transform: scale(0.55); }
    to   { opacity: 1; transform: scale(1); }
  }
  .hero-photo-frame img {
    position: relative; z-index: 1;
    width: 100%; height: 100%;
    object-fit: cover; border-radius: 50%;
    border: 3px solid var(--dark); display: block;
  }

  .subtitle-small {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(1rem, 3vw, 1.5rem);
    color: var(--warm); letter-spacing: 0.15em;
    animation: fadeUp 1s 0.3s both; opacity: 0.85;
  }
  .hero-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(3.2rem, 9vw, 7rem);
    font-weight: 400; font-style: italic; line-height: 0.95;
    background: linear-gradient(150deg, var(--cream) 0%, var(--gold) 45%, #e8d0a0 70%, var(--cream) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: fadeUp 1s 0.5s both; margin: 0.5rem 0 0.2rem;
    filter: drop-shadow(0 4px 30px #c8a96e22);
  }
  .hero-name {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(2.2rem, 7vw, 4.5rem); font-weight: 600;
    color: var(--rose); animation: fadeUp 1s 0.7s both;
    margin-bottom: 1.8rem;
    filter: drop-shadow(0 2px 20px #d4707a40);
  }
  .hero-date {
    font-size: 0.78rem; letter-spacing: 0.45em;
    text-transform: uppercase; color: var(--warm);
    opacity: 0.55; animation: fadeUp 1s 0.9s both;
    border-top: 1px solid #c8a96e20;
    border-bottom: 1px solid #c8a96e20;
    padding: 0.5rem 1.5rem;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(35px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .scroll-hint {
    position: absolute; bottom: 2.5rem; left: 50%;
    transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center; gap: 0.5rem;
    animation: fadeUp 1s 1.8s both; cursor: pointer;
    opacity: 0.45; transition: opacity 0.3s;
  }
  .scroll-hint:hover { opacity: 1; }
  .scroll-hint span {
    font-size: 0.65rem; letter-spacing: 0.45em;
    text-transform: uppercase; color: var(--warm);
  }
  .scroll-hint .arrow {
    width: 1px; height: 45px;
    background: linear-gradient(to bottom, var(--warm), transparent);
    animation: pulse-arrow 2s ease-in-out infinite;
  }
  @keyframes pulse-arrow {
    0%, 100% { opacity: 0.3; } 50% { opacity: 1; }
  }

  /* COMMONS */
  .section-label {
    font-size: 0.7rem; letter-spacing: 0.5em;
    text-transform: uppercase; color: var(--warm); opacity: 0.6;
  }
  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 4.5vw, 3.2rem);
    font-style: italic; text-align: center;
    color: var(--cream); margin-bottom: 0.5rem;
  }
  .section-divider {
    width: 80px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 1.2rem auto 3.5rem;
  }
  .section-connector {
    display: block; width: 1px; height: 80px; margin: 0 auto;
    background: linear-gradient(to bottom, transparent, #c8a96e35, transparent);
  }

  /* MUSIC */
  #music-section {
    padding: 6rem 2rem;
    display: flex; flex-direction: column; align-items: center; gap: 2rem;
  }
  .player-card {
    background: linear-gradient(145deg, #2e180e, #1a0e0700);
    border: 1px solid #ffffff0c; border-radius: 24px;
    padding: 2.5rem 2.8rem; width: min(500px, 92vw);
    box-shadow: 0 40px 100px #00000060, 0 1px 0 #ffffff08 inset;
    position: relative; overflow: hidden;
  }
  .player-card::before {
    content: ''; position: absolute; top: -60%; left: -30%;
    width: 100%; height: 100%;
    background: radial-gradient(ellipse, #c9956a0c, transparent 65%);
    border-radius: 50%; pointer-events: none;
  }
  .player-header { margin-bottom: 2rem; }
  .player-song-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.9rem; font-style: italic;
    color: var(--cream); margin-bottom: 0.3rem;
  }
  .player-artist {
    font-size: 0.8rem; color: var(--warm);
    letter-spacing: 0.25em; text-transform: uppercase; opacity: 0.7;
  }
  .progress-bar-wrap {
    position: relative; height: 3px;
    background: #ffffff10; border-radius: 2px;
    margin-bottom: 0.7rem; cursor: pointer;
  }
  .progress-bar-fill {
    position: absolute; left: 0; top: 0; bottom: 0;
    background: linear-gradient(90deg, var(--rose), var(--gold));
    border-radius: 2px; width: 0%; transition: width 0.5s linear;
  }
  .progress-bar-thumb {
    position: absolute; top: 50%;
    width: 14px; height: 14px; background: var(--cream); border-radius: 50%;
    transform: translate(-50%, -50%); left: 0%;
    transition: left 0.5s linear; box-shadow: 0 0 12px #d4707a70;
  }
  .time-row {
    display: flex; justify-content: space-between;
    font-size: 0.68rem; color: #ffffff35;
    margin-bottom: 2rem; font-family: 'Courier New', monospace;
  }
  .player-controls {
    display: flex; align-items: center;
    justify-content: center; gap: 2rem;
  }
  .ctrl-btn {
    background: none; border: none; color: var(--cream); cursor: pointer;
    opacity: 0.4; transition: opacity 0.2s, transform 0.2s;
    font-size: 1rem; padding: 0.5rem;
  }
  .ctrl-btn:hover { opacity: 0.9; transform: scale(1.15); }
  .play-btn {
    width: 62px; height: 62px; border-radius: 50%;
    background: linear-gradient(145deg, var(--rose), #b85060, var(--warm));
    border: none; color: white; font-size: 1.3rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 8px 35px #d4707a50, 0 2px 0 #ffffff20 inset;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .play-btn:hover { transform: scale(1.1); box-shadow: 0 14px 50px #d4707a70; }
  .play-btn:active { transform: scale(0.97); }
  .visualizer {
    display: flex; align-items: flex-end; justify-content: center;
    gap: 3px; height: 36px; margin-top: 2rem;
    padding-top: 0.5rem; border-top: 1px solid #ffffff06;
  }
  .vis-bar {
    width: 3px; background: linear-gradient(to top, #d4707a80, var(--gold));
    border-radius: 2px 2px 1px 1px; height: 4px;
    animation: visIdle 1.2s ease-in-out infinite alternate;
  }
  .vis-bar.active { animation: visActive 0.5s ease-in-out infinite alternate; }
  @keyframes visIdle   { to { height: 7px; opacity: 0.4; } }
  @keyframes visActive { 0% { height: 4px; } 100% { height: 32px; } }

  /* GALLERY */
  #gallery { padding: 6rem 2rem; max-width: 1100px; margin: 0 auto; }
  .masonry { columns: 2; column-gap: 0.9rem; }
  @media (min-width: 580px) { .masonry { columns: 3; } }
  .photo-card {
    break-inside: avoid; margin-bottom: 0.9rem;
    position: relative; overflow: hidden;
    border-radius: 14px; cursor: pointer;
    animation: fadeIn 0.9s both;
    box-shadow: 0 8px 30px #00000040;
    transition: box-shadow 0.4s, transform 0.4s;
  }
  .photo-card:hover { box-shadow: 0 20px 60px #00000060; transform: translateY(-3px); }
  .photo-card img {
    width: 100%; display: block;
    transition: transform 0.7s cubic-bezier(.22,.68,0,1.2);
  }
  .photo-card:hover img { transform: scale(1.06); }
  .photo-card .overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to top, #120c0695 0%, transparent 60%);
    opacity: 0; transition: opacity 0.35s;
    display: flex; align-items: flex-end; padding: 1.1rem 1rem;
  }
  .photo-card:hover .overlay { opacity: 1; }
  .photo-card .overlay span {
    font-family: 'Dancing Script', cursive;
    font-size: 1.15rem; color: var(--cream);
    text-shadow: 0 1px 8px #00000060;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(25px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* LIGHTBOX */
  #lightbox {
    position: fixed; inset: 0;
    background: #08040290; backdrop-filter: blur(24px);
    z-index: 9000; display: none;
    align-items: center; justify-content: center; padding: 1.5rem;
  }
  #lightbox.open { display: flex; animation: fadeIn 0.25s both; }
  #lightbox img {
    max-width: 90vw; max-height: 88vh;
    border-radius: 14px; object-fit: contain;
    box-shadow: 0 50px 150px #000000a0;
  }
  #lightbox-close {
    position: absolute; top: 1.5rem; right: 1.5rem;
    background: #ffffff12; border: 1px solid #ffffff15;
    color: var(--cream); width: 46px; height: 46px;
    border-radius: 50%; font-size: 1rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(12px); transition: background 0.2s;
  }
  #lightbox-close:hover { background: #ffffff22; }

  /* MESSAGE */
  #message {
    padding: 7rem 2rem 5rem;
    max-width: 740px; margin: 0 auto; text-align: center;
  }
  .heart-deco {
    font-size: 2.4rem;
    animation: heartbeat 2s ease-in-out infinite;
    display: block; margin-bottom: 1.5rem;
    filter: drop-shadow(0 0 20px #d4707a60);
  }
  @keyframes heartbeat {
    0%, 100% { transform: scale(1); }
    15%       { transform: scale(1.3); }
    30%       { transform: scale(1); }
    45%       { transform: scale(1.15); }
  }

  /* Main birthday poem */
  .message-poem {
    margin-bottom: 3.5rem;
  }
  .poem-line {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.05rem, 2.2vw, 1.35rem);
    font-style: italic; line-height: 1;
    color: var(--cream); opacity: 0;
    animation: revealLine 0.8s forwards;
    padding: 0.45rem 0;
  }
  .poem-line.gold {
    color: var(--gold);
    font-size: clamp(1.2rem, 2.8vw, 1.6rem);
    font-weight: 700;
  }
  .poem-line.rose {
    color: var(--rose);
    font-size: clamp(1.1rem, 2.4vw, 1.45rem);
  }
  .poem-line.big {
    font-size: clamp(1.4rem, 3.5vw, 2rem);
    font-weight: 700; color: var(--cream);
    padding: 0.8rem 0;
  }
  @keyframes revealLine {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 0.92; transform: translateY(0); }
  }

  /* Divider ornament */
  .ornament {
    display: flex; align-items: center; justify-content: center;
    gap: 1rem; margin: 2.5rem 0;
  }
  .ornament-line {
    flex: 1; height: 1px; max-width: 120px;
    background: linear-gradient(90deg, transparent, #c8a96e30);
  }
  .ornament-line.right {
    background: linear-gradient(90deg, #c8a96e30, transparent);
  }
  .ornament-symbol {
    font-size: 0.85rem; color: var(--gold); opacity: 0.5;
    letter-spacing: 0.5em;
  }

  /* Extra message */
  .extra-message {
    margin: 0 auto 3.5rem;
    background: linear-gradient(145deg, #2e180e55, #1a0e0725);
    border: 1px solid #ffffff08;
    border-left: 2px solid #d4707a70;
    border-radius: 18px;
    padding: 2.5rem 2.8rem;
    position: relative;
    box-shadow: 0 25px 70px #00000045, 0 1px 0 #ffffff05 inset;
    text-align: left;
  }
  .extra-message::before {
    content: '';
    position: absolute; top: 0; left: 2.5rem; right: 2.5rem; height: 1px;
    background: linear-gradient(90deg, transparent, #c8a96e18, transparent);
  }
  .extra-orb {
    display: block; text-align: center;
    font-size: 0.7rem; opacity: 0.25;
    margin-bottom: 1.8rem; letter-spacing: 1em;
  }
  .extra-text {
    font-size: clamp(1.05rem, 2.3vw, 1.3rem);
    font-style: italic; line-height: 2.1;
    color: var(--cream); opacity: 0.85;
  }
  .highlight-100 {
    font-family: 'Dancing Script', cursive;
    font-size: 1.5em; font-style: normal; font-weight: 700;
    color: var(--gold);
    filter: drop-shadow(0 0 12px #c8a96e50);
  }

  .message-sign {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(2rem, 5vw, 3rem); font-weight: 700;
    color: var(--rose);
    filter: drop-shadow(0 2px 20px #d4707a50);
    display: block; margin-top: 1rem;
  }

  /* FOOTER */
  footer {
    padding: 3.5rem 2rem; text-align: center;
    border-top: 1px solid #ffffff06;
  }
  footer p {
    font-family: 'Dancing Script', cursive;
    font-size: 1.15rem; color: var(--warm); opacity: 0.5;
  }
  .hearts-footer {
    margin-top: 0.8rem; font-size: 1.1rem;
    letter-spacing: 0.5em; opacity: 0.3 !important;
  }
</style>
</head>
<body>

<div class="petals-container" id="petals"></div>
<div id="lightbox">
  <button id="lightbox-close">✕</button>
  <img id="lightbox-img" src="" alt="">
</div>

<!-- HERO -->
<section id="hero">
  <div class="hero-bg"></div>
  <div class="hero-rings">
    <div class="hero-photo-frame">
      <img src="1.jpg" alt="Mi amor">
    </div>
  </div>
  <p class="subtitle-small">✦ Hoy es tu día especial ✦</p>
  <h1 class="hero-title">Feliz<br>Cumpleaños</h1>
  <p class="hero-name">Mi Amor 🌹</p>
  <p class="hero-date">06 de Abril &nbsp;·&nbsp; 2026</p>
  
</section>

<span class="section-connector"></span>

<!-- MUSIC -->
<section id="music-section">
  <p class="section-label">♫ &nbsp; Te amo &nbsp; ♫</p>
  <div class="player-card">
    <div class="player-header">
      <p class="player-song-title">Si Hay Algo</p>
      <p class="player-artist">Josean Log</p>
    </div>
    <div class="progress-bar-wrap" id="progress-wrap">
      <div class="progress-bar-fill" id="prog-fill"></div>
      <div class="progress-bar-thumb" id="prog-thumb"></div>
    </div>
    <div class="time-row">
      <span id="time-cur">0:00</span>
      <span id="time-tot">--:--</span>
    </div>
    <div class="player-controls">
      <button class="ctrl-btn" id="btn-back">⟵</button>
      <button class="play-btn" id="play-pause-btn">▶</button>
      <button class="ctrl-btn" id="btn-vol">♪</button>
    </div>
    <div class="visualizer" id="visualizer"></div>
  </div>
  <audio id="audio" preload="metadata">
    <source src="si-hay-algo.mp3" type="audio/mpeg">
  </audio>
</section>

<span class="section-connector"></span>

<!-- GALLERY -->
<section id="gallery">
  <p class="section-label" style="text-align:center;">✦ &nbsp; Nuestros momentos &nbsp; ✦</p>
  <h2 class="section-title">Cada foto, un recuerdo</h2>
  <div class="section-divider"></div>
  <div class="masonry" id="photo-grid"></div>
</section>

<span class="section-connector"></span>

<!-- MESSAGE -->
<section id="message">
  <span class="heart-deco">❤️</span>
  <h2 class="section-title" style="margin-bottom: 0.5rem;">Para ti, mi amor</h2>
  <div class="section-divider"></div>

  <!-- Poem -->
  <div class="message-poem" id="poem"></div>

  <!-- ornament -->
  <div class="ornament">
    <div class="ornament-line"></div>
    <span class="ornament-symbol">✦ ✦ ✦</span>
    <div class="ornament-line right"></div>
  </div>

  

  <span class="message-sign">Con todo mi amor 💕</span>
</section>

<footer>
  <p>Hecho con todo el amor del mundo para ti</p>
  <p class="hearts-footer">♡ &nbsp; ♡ &nbsp; ♡</p>
</footer>

<script>
// ── PETALS ──
const petalContainer = document.getElementById('petals');
for (let i = 0; i < 28; i++) {
  const p = document.createElement('div');
  p.className = 'petal';
  p.style.left = Math.random() * 105 + 'vw';
  p.style.animationDuration = (7 + Math.random() * 9) + 's';
  p.style.animationDelay = (-Math.random() * 12) + 's';
  const s = 6 + Math.random() * 9;
  p.style.width = s + 'px';
  p.style.height = (s * 1.4) + 'px';
  p.style.opacity = 0.35 + Math.random() * 0.55;
  p.style.transform = `rotate(${Math.random()*360}deg)`;
  petalContainer.appendChild(p);
}

// ── POEM ──
const poemLines = [
  { text: 'Hoy el mundo cumple un año más de tenerte,',        cls: '' },
  { text: 'y yo un año más de saber lo que es amar de verdad.', cls: 'rose' },
  { text: '', cls: '' },
  { text: 'Desde el día en que llegaste a mi vida',             cls: '' },
  { text: 'aprendí que el amor no es un sentimiento que llega,', cls: '' },
  { text: 'es una persona.',                                    cls: 'gold' },
  { text: 'Y esa persona eres tú.',                             cls: 'gold' },
  { text: '', cls: '' },
  { text: 'Eres la voz que calma mi silencio,',                cls: '' },
  { text: 'la mirada que me hace sentir en casa,',             cls: '' },
  { text: 'el nombre que guardo en el lugar más profundo',     cls: '' },
  { text: 'de mi corazón.',                                    cls: 'rose' },
  { text: '', cls: '' },
  { text: 'Hoy no solo festejo el día en que naciste,',        cls: '' },
  { text: 'festejo cada versión tuya que he tenido el privilegio de conocer,', cls: '' },
  { text: 'tu fuerza, tu luz, tu manera única',                cls: '' },
  { text: 'de existir en este mundo.',                         cls: 'rose' },
  { text: '', cls: '' },
  { text: '¡Feliz cumpleaños, mi amor!',                       cls: 'big' },
  { text: '', cls: '' },
  { text: 'Que este nuevo año de tu vida',                     cls: '' },
  { text: 'esté lleno de todo lo que mereces:',               cls: '' },
  { text: 'paz, alegría, y la certeza',                        cls: '' },
  { text: 'de que siempre, siempre voy a estar aquí.',         cls: 'gold' },
  { text: '', cls: '' },
  { text: 'Te amo hoy, mañana y en cada vida que me toque vivir.',  cls: 'rose' },
];

const poemEl = document.getElementById('poem');
poemLines.forEach((line, i) => {
  if (!line.text) {
    const br = document.createElement('div');
    br.style.height = '0.6rem';
    poemEl.appendChild(br);
    return;
  }
  const p = document.createElement('p');
  p.className = 'poem-line' + (line.cls ? ' ' + line.cls : '');
  p.textContent = line.text;
  p.style.animationDelay = (0.1 + i * 0.12) + 's';
  poemEl.appendChild(p);
});

// ── PHOTOS ──
const photos = [
  { src: '1.jpg', caption: 'Tarde dorada' },
  { src: '2.jpg', caption: 'Juntos' },
  { src: '4.jpg', caption: 'Nuestra cena' },
  { src: '5.jpg', caption: 'Siempre contigo' },
  { src: '6.jpg', caption: 'En las sombras' },
  { src: '7.jpg', caption: 'Nuestro beso' },
  { src: '8.jpg', caption: 'Ella' },
];
const grid = document.getElementById('photo-grid');
photos.forEach((ph, i) => {
  const card = document.createElement('div');
  card.className = 'photo-card';
  card.style.animationDelay = (i * 0.12) + 's';
  card.innerHTML = `<img src="${ph.src}" alt="${ph.caption}" loading="lazy"><div class="overlay"><span>${ph.caption}</span></div>`;
  card.addEventListener('click', () => openLightbox(ph.src));
  grid.appendChild(card);
});

// ── LIGHTBOX ──
const lb = document.getElementById('lightbox');
const lbImg = document.getElementById('lightbox-img');
document.getElementById('lightbox-close').addEventListener('click', () => lb.classList.remove('open'));
lb.addEventListener('click', e => { if (e.target === lb) lb.classList.remove('open'); });
function openLightbox(src) { lbImg.src = src; lb.classList.add('open'); }

// ── VISUALIZER ──
const vis = document.getElementById('visualizer');
const bars = [];
for (let i = 0; i < 20; i++) {
  const b = document.createElement('div');
  b.className = 'vis-bar';
  b.style.animationDelay = (i * 0.07) + 's';
  b.style.animationDuration = (0.35 + Math.random() * 0.45) + 's';
  vis.appendChild(b); bars.push(b);
}

// ── AUDIO ──
const audio     = document.getElementById('audio');
const playBtn   = document.getElementById('play-pause-btn');
const progFill  = document.getElementById('prog-fill');
const progThumb = document.getElementById('prog-thumb');
const timeCur   = document.getElementById('time-cur');
const timeTot   = document.getElementById('time-tot');
let playing = false;
const fmt = s => Math.floor(s/60) + ':' + String(Math.floor(s%60)).padStart(2,'0');

audio.addEventListener('loadedmetadata', () => { timeTot.textContent = fmt(audio.duration); });
audio.addEventListener('timeupdate', () => {
  if (!audio.duration) return;
  const pct = (audio.currentTime / audio.duration) * 100;
  progFill.style.width = pct + '%';
  progThumb.style.left = pct + '%';
  timeCur.textContent = fmt(audio.currentTime);
});
audio.addEventListener('ended', () => setPlaying(false));

function setPlaying(v) {
  playing = v;
  playBtn.textContent = v ? '⏸' : '▶';
  bars.forEach(b => v ? b.classList.add('active') : b.classList.remove('active'));
}
playBtn.addEventListener('click', () => {
  playing ? (audio.pause(), setPlaying(false)) : (audio.play().catch(()=>{}), setPlaying(true));
});
document.getElementById('btn-back').addEventListener('click', () => { audio.currentTime = 0; });
document.getElementById('btn-vol').addEventListener('click', () => { audio.muted = !audio.muted; });
document.getElementById('progress-wrap').addEventListener('click', e => {
  const r = e.currentTarget.getBoundingClientRect();
  audio.currentTime = ((e.clientX - r.left) / r.width) * audio.duration;
});
document.addEventListener('click', function once() {
  if (!playing && audio.readyState >= 2) { audio.play().catch(()=>{}); setPlaying(true); }
  document.removeEventListener('click', once);
}, { once: true });
</script>
</body>
